<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>微盘股多空监测系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--bg2:#1a1d28;--bg3:#242736;--border:#2d3044;
  --text:#e8eaf0;--text2:#8b90a5;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;--cyan:#06b6d4;--pink:#ec4899;
  --card-shadow:0 4px 24px rgba(0,0,0,.3);
}
html{font-size:14px}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;padding:20px;
}
.container{max-width:1440px;margin:0 auto}
.header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.header h1{
  font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,#22c55e,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.header .subtitle{font-size:.85rem;color:var(--text2);margin-top:4px;-webkit-text-fill-color:var(--text2)}
.header-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header-right .timestamp{font-size:.75rem;color:var(--text2)}
.refresh-btn{
  background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:8px 20px;border-radius:8px;cursor:pointer;font-size:.85rem;
  transition:all .2s;
}
.refresh-btn:hover{background:var(--border);border-color:var(--blue)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-bottom:20px}
.cards-grid-4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.cards-grid-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}

.card{
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:18px;box-shadow:var(--card-shadow);position:relative;overflow:hidden;
}
.card-label{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.card-value{font-size:1.7rem;font-weight:700;line-height:1.2}
.card-value.green{color:var(--green)}
.card-value.red{color:var(--red)}
.card-value.yellow{color:var(--yellow)}
.card-value.blue{color:var(--blue)}
.card-value.purple{color:var(--purple)}
.card-value.orange{color:var(--orange)}
.card-value.cyan{color:var(--cyan)}
.card-value.pink{color:var(--pink)}
.card-sub{font-size:.78rem;color:var(--text2);margin-top:3px}
.card-icon{position:absolute;top:14px;right:14px;font-size:1.4rem;opacity:.12}
.card-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:600;margin-left:6px}
.badge-green{background:rgba(34,197,94,.18);color:var(--green)}
.badge-red{background:rgba(239,68,68,.18);color:var(--red)}
.badge-yellow{background:rgba(234,179,8,.18);color:var(--yellow)}
.badge-blue{background:rgba(59,130,246,.18);color:var(--blue)}

.gauge-card{grid-column:span 2}
@media(max-width:800px){.gauge-card{grid-column:span 1}}
.gauge-container{display:flex;align-items:center;gap:24px;padding:4px 0}
.gauge-ring{position:relative;width:120px;height:120px;flex-shrink:0}
.gauge-ring canvas{width:120px!important;height:120px!important}
.gauge-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-center .score{font-size:1.6rem;font-weight:700;line-height:1}
.gauge-center .label{font-size:.65rem;color:var(--text2);margin-top:1px}
.gauge-info{flex:1}
.gauge-info .signal{font-size:1.2rem;font-weight:700;margin-bottom:4px}
.gauge-info .position-recs{background:var(--bg3);border-radius:8px;padding:8px 12px;margin-top:6px}
.gauge-info .position-recs .rec-label{font-size:.7rem;color:var(--text2)}
.gauge-info .position-recs .rec-value{font-size:1rem;font-weight:600}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:900px){.charts-row{grid-template-columns:1fr}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--card-shadow)}
.chart-card h3{font-size:.85rem;font-weight:600;margin-bottom:12px;color:var(--text2)}
.chart-card .chart-wrap{position:relative;height:210px}

.industry-flow-row{margin-bottom:20px}
.flow-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--card-shadow)}
.flow-card h3{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--text2)}
.flow-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.flow-grid{grid-template-columns:1fr}}
.flow-col h4{font-size:.8rem;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.flow-table{width:100%;border-collapse:collapse;font-size:.82rem}
.flow-table th{text-align:left;padding:6px 6px;border-bottom:1px solid var(--border);font-weight:500;color:var(--text2);font-size:.7rem}
.flow-table td{padding:5px 6px;border-bottom:1px solid rgba(45,48,68,.3)}
.flow-table tr:last-child td{border-bottom:none}
.flow-table .rank{color:var(--text2);width:24px;text-align:center}
.flow-table .inflow{color:var(--green);font-weight:600}
.flow-table .outflow{color:var(--red);font-weight:600}

.tables-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:900px){.tables-row{grid-template-columns:1fr}}
.table-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--card-shadow)}
.table-card h3{font-size:.85rem;font-weight:600;margin-bottom:10px;color:var(--text2)}
.stock-table{width:100%;border-collapse:collapse;font-size:.82rem}
.stock-table th{text-align:left;padding:6px 6px;border-bottom:1px solid var(--border);font-weight:500;color:var(--text2);font-size:.7rem}
.stock-table td{padding:5px 6px;border-bottom:1px solid rgba(45,48,68,.3)}
.stock-table tr:last-child td{border-bottom:none}
.stock-table .code{color:var(--text2);font-family:monospace;font-size:.78rem}
.stock-table .name{font-weight:500}
.stock-table .up{color:var(--green)}
.stock-table .down{color:var(--red)}

.loading-overlay{display:none;text-align:center;padding:60px 20px;color:var(--text2)}
.loading-overlay.active{display:block}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){
  body{padding:12px};.header h1{font-size:1.2rem}
  .cards-grid{grid-template-columns:1fr 1fr;gap:10px}
  .card{padding:12px};.card-value{font-size:1.3rem}
  .gauge-container{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>📊 微盘股多空监测系统</h1>
      <div class="subtitle">A股最小市值400只 · 市场宽度 · 行业资金流 · RSI · 仓位建议</div>
    </div>
    <div class="header-right">
      <span class="timestamp" id="timestamp">加载中...</span>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">⟳ 刷新数据</button>
    </div>
  </div>
  <div class="loading-overlay" id="loading"><div class="spinner"></div><div>正在生成数据...</div></div>
  <div id="dashboard" style="display:none">
    <div class="cards-grid" id="summaryCards"></div>
    <div class="cards-grid cards-grid-2" id="breadthCards"></div>
    <div class="cards-grid" id="gaugeRow"></div>
    <div class="charts-row">
      <div class="chart-card"><h3>📈 ADL（腾落线）</h3><div class="chart-wrap"><canvas id="adlChart"></canvas></div></div>
      <div class="chart-card"><h3>📊 平均RSI</h3><div class="chart-wrap"><canvas id="rsiChart"></canvas></div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card"><h3>🏛 站上20日均线行业占比</h3><div class="chart-wrap"><canvas id="breadthChart"></canvas></div></div>
      <div class="chart-card"><h3>💰 资金集中度（Top10%成交额占比）</h3><div class="chart-wrap"><canvas id="concChart"></canvas></div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card"><h3>📉 平均20日涨幅</h3><div class="chart-wrap"><canvas id="retChart"></canvas></div></div>
      <div class="chart-card"><h3>🎯 综合评分</h3><div class="chart-wrap"><canvas id="scoreChart"></canvas></div></div>
    </div>
    <div style="margin-bottom:20px">
      <div class="chart-card"><h3>📋 当日涨跌幅分布</h3><div class="chart-wrap" style="height:180px"><canvas id="distChart"></canvas></div></div>
    </div>
    <div class="industry-flow-row" id="industryFlowRow"></div>
    <div class="tables-row">
      <div class="table-card"><h3>🏆 涨幅TOP 10</h3><table class="stock-table" id="gainersTable"><thead><tr><th>代码</th><th>名称</th><th>现价</th><th>涨幅</th></tr></thead><tbody></tbody></table></div>
      <div class="table-card"><h3>📉 跌幅TOP 10</h3><table class="stock-table" id="losersTable"><thead><tr><th>代码</th><th>名称</th><th>现价</th><th>涨幅</th></tr></thead><tbody></tbody></table></div>
    </div>
  </div>
</div>

<script>
const SECONDARY_INDUSTRIES = [
  "半导体","软件服务","IT设备","通信设备","通信服务","元器件","光学光电","消费电子","电子制造",
  "汽车整车","汽车零部件","汽车服务","锂电池","光伏设备","风电设备","电网设备","电力",
  "石油石化","煤炭","有色金属","钢铁","基础化工","建筑装饰","建筑材料","房地产","物业管理",
  "银行","证券","保险","多元金融","食品饮料","白酒","调味品","乳制品",
  "医药生物","中药","医疗器械","化学制药","生物制品","家用电器","纺织服装","轻工制造","包装印刷",
  "机械设备","通用设备","专用设备","仪器仪表","国防军工","航空航天","地面兵装",
  "交通运输","航空机场","铁路公路","物流","农林牧渔","养殖业","种植业","饲料",
  "商贸零售","一般零售","专业连锁","社会服务","旅游酒店","餐饮",
  "传媒","游戏","广告营销","影视院线","公用事业","环保","水务","燃气","综合",
];

const STOCK_NAMES = [
  "华微电子","中光防雷","天瑞仪器","金力永磁","赛摩智能","长荣股份","四方达","华铭智能",
  "南华仪器","精准信息","华鹏飞","海伦钢琴","惠伦晶体","中威电子","澄天伟业",
  "集智股份","友讯达","必创科技","科创信息","中富通","华虹科技","华讯方舟","华信股份",
  "中科云网","中天能源","华业资本","华塑控股","华菱星马","华电能源","中航资本",
  "华润双鹤","中粮生化","华映科技","中金黄金","中兴通讯","中船防务","中科曙光",
  "中国软件","中粮糖业","中远海控","中金岭南","中色股份","中钢国际","中工国际","深中华A",
];

// ─── Date-seeded PRNG ────────────────────────────────────────────────
let _SEED = new Date();
_SEED = _SEED.getFullYear() * 10000 + (_SEED.getMonth() + 1) * 100 + _SEED.getDate();
function _srand() {
  _SEED = (_SEED * 1664525 + 1013904223) & 0x7FFFFFFF;
  return (_SEED >>> 0) / 0x7FFFFFFF;
}

function rand(a, b) { return _srand() * (b - a) + a; }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }

// ── Render Functions ──
let charts = {};

function renderCards(d) {
  const s = d.summary;
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="card-icon">↑</div><div class="card-label">上涨家数</div><div class="card-value green">${s.advancing}</div><div class="card-sub">下跌 ${s.declining} / 平盘 ${s.unchanged}</div></div>
    <div class="card"><div class="card-icon">📐</div><div class="card-label">ADL 腾落线</div><div class="card-value ${s.adl >= 0 ? 'green' : 'red'}">${s.adl > 0 ? '+' : ''}${s.adl}</div><div class="card-sub">上涨-下跌差值</div></div>
    <div class="card"><div class="card-icon">📊</div><div class="card-label">平均RSI</div><div class="card-value ${s.avg_rsi > 60 ? 'green' : s.avg_rsi < 40 ? 'red' : 'yellow'}">${s.avg_rsi}</div><div class="card-sub">14日周期 · 中性区50</div></div>
    <div class="card"><div class="card-icon">📈</div><div class="card-label">20日涨幅均值</div><div class="card-value ${s.avg_return_20d >= 0 ? 'green' : 'red'}">${s.avg_return_20d >= 0 ? '+' : ''}${s.avg_return_20d}%</div><div class="card-sub">400只微盘股平均</div></div>
    <div class="card"><div class="card-icon">💎</div><div class="card-label">平均股价</div><div class="card-value blue">¥${s.avg_price}</div><div class="card-sub">微盘股均价</div></div>
  `;
}

function renderBreadthCards(d) {
  const ind = d.industry_data;
  const conc = ind.capital_concentration;
  const bc = ind.breadth_pct >= 65 ? 'green' : ind.breadth_pct >= 40 ? 'yellow' : 'red';
  const bg = ind.breadth_signal === '普涨' ? 'badge-green' : ind.breadth_signal === '分化' ? 'badge-yellow' : 'badge-red';
  const cc = conc.ratio >= 40 ? 'pink' : conc.ratio >= 28 ? 'orange' : 'blue';
  const cb = conc.ratio >= 40 ? 'badge-red' : conc.ratio >= 28 ? 'badge-yellow' : 'badge-blue';
  document.getElementById('breadthCards').innerHTML = `
    <div class="card"><div class="card-icon">🏛</div><div class="card-label">站上20日均线 · 二级行业占比</div><div class="card-value ${bc}">${ind.breadth_pct}%</div><div class="card-sub">${ind.industries_above_20ma}/${ind.total_industries} 个行业站上20日线 <span class="card-badge ${bg}">${ind.breadth_signal}</span></div></div>
    <div class="card"><div class="card-icon">💰</div><div class="card-label">资金集中度（Top10%成交额占比）</div><div class="card-value ${cc}">${conc.ratio}%</div><div class="card-sub">Top${conc.top_10pct_count}只占成交额 ${conc.ratio}% <span class="card-badge ${cb}">${conc.signal}</span></div></div>
  `;
}

function renderGauge(d) {
  document.getElementById('gaugeRow').innerHTML = `
    <div class="card gauge-card"><div class="gauge-container">
      <div class="gauge-ring"><canvas id="gaugeCanvas"></canvas><div class="gauge-center"><div class="score">${d.composite_score}</div><div class="label">综合评分</div></div></div>
      <div class="gauge-info">
        <div class="signal ${d.composite_score >= 55 ? 'green' : d.composite_score >= 40 ? 'yellow' : 'red'}">${d.signal}</div>
        <div style="font-size:.82rem;color:var(--text2);margin-top:3px">多方优势 <strong style="color:${d.composite_score >= 50 ? 'var(--green)' : 'var(--red)'}">${d.composite_score}%</strong> · 空方优势 <strong style="color:${100 - d.composite_score >= 50 ? 'var(--red)' : 'var(--green)'}">${(100 - d.composite_score).toFixed(1)}%</strong></div>
        <div class="position-recs"><div class="rec-label">💼 建议仓位</div><div class="rec-value ${d.position_pct >= 55 ? 'green' : d.position_pct >= 30 ? 'yellow' : 'orange'}">${d.position}</div></div>
      </div>
    </div></div>`;
  const ctx = document.getElementById('gaugeCanvas').getContext('2d');
  new Chart(ctx, { type: 'doughnut', data: { datasets: [{ data: [d.composite_score, 100 - d.composite_score], backgroundColor: ['#22c55e','#2d3044'], borderWidth: 0, circumference: 270, rotation: 225 }] }, options: { cutout: '78%', responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false }, tooltip: { enabled: false } } } });
}

function makeLine(id, label, data, color, opts) {
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id).getContext('2d'), {
    type: 'line',
    data: { labels: data.labels, datasets: [{ label, data: data.values, borderColor: color, backgroundColor: color.replace(')', ',.08)').replace('rgb', 'rgba'), fill: true, tension: .3, pointRadius: 0, borderWidth: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true, ticks: { color: '#8b90a5', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: 'rgba(45,48,68,.3)' } }, y: { display: true, ticks: { color: '#8b90a5', font: { size: 10 }, ...opts?.yticks }, grid: { color: 'rgba(45,48,68,.3)' } } }, interaction: { intersect: false, mode: 'index' }, ...opts?.extra },
  });
}

function renderCharts(d) {
  const h = d.history;
  const labels = h.dates;

  makeLine('adlChart', 'ADL', { labels, values: h.adl }, 'rgb(34,197,94)');

  makeLine('rsiChart', '平均RSI', { labels, values: h.avg_rsi }, 'rgb(139,92,246)', { yticks: {}, extra: { scales: { y: { min: 20, max: 80 } } } });

  // Breadth chart with zones
  if (charts.breadth) charts.breadth.destroy();
  charts.breadth = new Chart(document.getElementById('breadthChart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{ label: '站上20MA行业占比(%)', data: h.market_breadth, borderColor: '#06b6d4', backgroundColor: 'rgba(6,182,212,.08)', fill: true, tension: .3, pointRadius: 0, borderWidth: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true, ticks: { color: '#8b90a5', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: 'rgba(45,48,68,.3)' } }, y: { min: 0, max: 100, display: true, ticks: { color: '#8b90a5', font: { size: 10 }, callback: v => v + '%' }, grid: { color: 'rgba(45,48,68,.3)' } } }, interaction: { intersect: false, mode: 'index' } },
    plugins: [{
      id: 'breadthZones', beforeDraw: ctx => { const { ctx: c, chartArea: a, scales: s } = ctx; if (!a) return; c.save(); const y65 = s.y.getPixelForValue(65); c.fillStyle = 'rgba(34,197,94,.06)'; c.fillRect(a.left, y65, a.right - a.left, a.top - y65); const y40 = s.y.getPixelForValue(40); c.fillStyle = 'rgba(239,68,68,.06)'; c.fillRect(a.left, a.bottom, a.right - a.left, y40 - a.bottom); c.restore(); }
    }]
  });

  makeLine('concChart', '资金集中度(%)', { labels, values: h.cap_concentration }, 'rgb(236,72,153)', { yticks: { callback: v => v + '%' } });

  // Return bar chart
  if (charts.ret) charts.ret.destroy();
  const retColors = h.avg_20d_return.map(v => v >= 0 ? '#22c55e' : '#ef4444');
  charts.ret = new Chart(document.getElementById('retChart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ data: h.avg_20d_return, backgroundColor: retColors, borderRadius: 2, borderWidth: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true, ticks: { color: '#8b90a5', maxTicksLimit: 8, font: { size: 10 } }, grid: { display: false } }, y: { display: true, ticks: { color: '#8b90a5', font: { size: 10 }, callback: v => v + '%' }, grid: { color: 'rgba(45,48,68,.3)' } } }, interaction: { intersect: false, mode: 'index' } }
  });

  // Score chart
  if (charts.score) charts.score.destroy();
  const scores = h.avg_rsi.map((rsi, i) => {
    const minA = Math.min(...h.adl), maxA = Math.max(...h.adl);
    return Math.round(clamp(rsi / 100 * 50 + (maxA > minA ? (h.adl[i] - minA) / (maxA - minA) * 50 : 50), 0, 100));
  });
  charts.score = new Chart(document.getElementById('scoreChart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [{ data: scores, borderColor: '#06b6d4', backgroundColor: 'rgba(6,182,212,.08)', fill: true, tension: .3, pointRadius: 0, borderWidth: 2 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true, ticks: { color: '#8b90a5', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: 'rgba(45,48,68,.3)' } }, y: { min: 0, max: 100, display: true, ticks: { color: '#8b90a5', font: { size: 10 } }, grid: { color: 'rgba(45,48,68,.3)' } } }, interaction: { intersect: false, mode: 'index' } }
  });
}

function renderDistribution(d) {
  if (charts.dist) charts.dist.destroy();
  const labels = Object.keys(d.distribution), values = Object.values(d.distribution);
  const colors = ['#ef4444','#f97316','#eab308','#22c55e','#22c55e','#06b6d4','#8b5cf6','#ec4899'];
  charts.dist = new Chart(document.getElementById('distChart').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderRadius: 4, borderWidth: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'end', color: '#8b90a5', font: { size: 10 }, formatter: v => v > 0 ? v : '' } }, scales: { x: { ticks: { color: '#8b90a5', font: { size: 9 } }, grid: { display: false } }, y: { display: true, ticks: { color: '#8b90a5', font: { size: 10 } }, grid: { color: 'rgba(45,48,68,.3)' } } } },
    plugins: [ChartDataLabels]
  });
}

function renderIndustryFlow(d) {
  const flow = d.industry_data.industry_flow_5d;
  if (!flow) return;
  document.getElementById('industryFlowRow').innerHTML = `
    <div class="flow-card"><h3>💧 二级行业 · 5日资金净流入/流出 TOP 5</h3>
    <div class="flow-grid">
      <div class="flow-col"><h4 style="color:var(--green)">📗 净流入前5</h4><table class="flow-table"><thead><tr><th>#</th><th>行业</th><th>5日净流入(亿)</th></tr></thead><tbody>
        ${flow.top_inflow.map((f,i) => `<tr><td class="rank">${i+1}</td><td>${f.industry}</td><td class="inflow">+${f.net_flow_5d.toFixed(1)}</td></tr>`).join('')}
      </tbody></table></div>
      <div class="flow-col"><h4 style="color:var(--red)">📕 净流出前5</h4><table class="flow-table"><thead><tr><th>#</th><th>行业</th><th>5日净流出(亿)</th></tr></thead><tbody>
        ${flow.top_outflow.map((f,i) => `<tr><td class="rank">${i+1}</td><td>${f.industry}</td><td class="outflow">${f.net_flow_5d.toFixed(1)}</td></tr>`).join('')}
      </tbody></table></div>
    </div></div>`;
}

function renderTables(d) {
  document.querySelector('#gainersTable tbody').innerHTML = d.top_gainers.map(s =>
    `<tr><td class="code">${s.code}</td><td class="name">${s.name}</td><td>${s.price}</td><td class="up">+${s.change_pct}%</td></tr>`).join('');
  document.querySelector('#losersTable tbody').innerHTML = d.top_losers.map(s =>
    `<tr><td class="code">${s.code}</td><td class="name">${s.name}</td><td>${s.price}</td><td class="down">${s.change_pct}%</td></tr>`).join('');
}

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  const loading = document.getElementById('loading');
  const dash = document.getElementById('dashboard');
  btn.disabled = true; btn.textContent = '⟳ 刷新中...';
  loading.classList.add('active'); dash.style.display = 'none';

  try {
    // Try real API first, fall back to client-side mock data
    let d;
    try {
      const resp = await fetch('/api/overview');
      if (resp.ok) d = await resp.json();
    } catch (e) { /* API not available, use mock */ }
    if (!d) d = generateMockData();

    document.getElementById('timestamp').textContent = '更新于 ' + d.timestamp;
    renderCards(d);
    renderBreadthCards(d);
    renderGauge(d);
    renderCharts(d);
    renderDistribution(d);
    renderIndustryFlow(d);
    renderTables(d);
    loading.classList.remove('active');
    dash.style.display = 'block';
  } catch (e) {
    loading.innerHTML = `<div style="color:var(--red);font-size:1.1rem">⚠ 数据生成失败: ${e.message}</div><button class="refresh-btn" style="margin-top:16px" onclick="refreshData()">重试</button>`;
  } finally {
    btn.disabled = false; btn.textContent = '⟳ 刷新数据';
  }
}

refreshData();
setInterval(refreshData, 300000);
</script>
</body>
</html>
